<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="theme-color" content="#111827">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <title>운동기록</title>
  <style>
    :root {
      --blue:#2563EB; --blue-lt:#EFF6FF; --blue-dk:#1D4ED8;
      --green:#16A34A; --green-lt:#F0FDF4; --green-dk:#15803D;
      --red:#DC2626; --red-lt:#FEF2F2;
      --bg:#F8FAFC; --card:#FFFFFF; --text:#111827; --muted:#6B7280; --border:#E5E7EB;
      --radius:14px; --radius-sm:8px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    html,body{height:100%;background:var(--bg);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:var(--text);font-size:15px;}
    .page{display:none;min-height:100vh;}
    .page.active{display:block;}

    /* 인트로 */
    .intro-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;}
    .intro-logo{font-size:48px;margin-bottom:10px;}
    .intro-title{font-size:28px;font-weight:800;letter-spacing:-.03em;margin-bottom:6px;}
    .intro-sub{font-size:14px;color:var(--muted);margin-bottom:40px;}
    .intro-input{width:100%;max-width:320px;padding:14px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:16px;font-family:inherit;outline:none;background:white;margin-bottom:12px;}
    .intro-input:focus{border-color:var(--blue);}
    .intro-btn{width:100%;max-width:320px;padding:15px;background:var(--blue);color:white;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;}
    .admin-link{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;padding:4px 8px;text-decoration:underline;}

    /* 메인 */
    #page-main{padding-bottom:70px;}
    .main-header{background:white;border-bottom:1px solid var(--border);padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
    .header-title{font-size:18px;font-weight:800;letter-spacing:-.03em;}
    .header-user{font-size:12px;color:var(--muted);margin-top:2px;}
    .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;}
    .fab-save{position:fixed;bottom:calc(70px + env(safe-area-inset-bottom) + 14px);right:16px;padding:12px 20px;background:var(--blue);color:white;border:none;border-radius:30px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(37,99,235,.4);z-index:25;}
    .fab-save:active{background:var(--blue-dk);}
    .fab-save.saved{background:var(--green);}

    /* 하단 탭바 */
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom);}
    .nav-btn{flex:1;padding:10px 0 8px;border:none;background:none;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10px;font-weight:500;}
    .nav-btn.active{color:var(--blue);}
    .nav-icon{font-size:22px;line-height:1;}

    /* 탭 */
    .tab-content{display:none;}
    .tab-content.active{display:block;}

    /* 오늘 탭 */
    .today-header{padding:20px 16px 8px;}
    .today-date{font-size:12px;color:var(--muted);margin-bottom:4px;}
    .today-title{font-size:22px;font-weight:800;letter-spacing:-.03em;}
    .split-selector{padding:12px 16px 8px;display:flex;flex-wrap:wrap;gap:8px;}
    .split-btn{padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted);transition:all .15s;}
    .split-btn.rest-btn{color:var(--muted);}
    .exercise-section{padding:0 16px;display:flex;flex-direction:column;gap:10px;}
    .ex-card{background:white;border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;}
    .ex-card-header{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
    .ex-card-name{font-size:15px;font-weight:700;}
    .ex-progress{font-size:12px;color:var(--muted);}
    .ex-progress.all-done{color:var(--green-dk);font-weight:600;}
    .ex-sets{border-top:1px solid var(--border);}
    .set-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);}
    .set-row:last-child{border-bottom:none;}
    .set-row.done-row{background:var(--green-lt);}
    .set-num{font-size:12px;font-weight:600;color:var(--muted);width:18px;flex-shrink:0;}
    .set-input{width:58px;padding:7px 6px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;text-align:center;outline:none;background:white;}
    .set-input:focus{border-color:var(--blue);}
    .set-input:disabled{background:#F9FAFB;color:var(--muted);}
    .set-unit{font-size:11px;color:var(--muted);flex-shrink:0;}
    .set-check-btn{margin-left:auto;padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted);flex-shrink:0;white-space:nowrap;}
    .set-check-btn.done{border-color:var(--green);background:var(--green-lt);color:var(--green-dk);}
    .finish-btn{margin:20px 16px 8px;width:calc(100% - 32px);padding:15px;background:var(--green);color:white;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;}
    .empty-msg{text-align:center;padding:40px 16px;color:var(--muted);font-size:14px;line-height:1.8;}

    /* 타이머 */
    .timer-sheet{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);border-radius:20px 20px 0 0;padding:16px 24px calc(80px + env(safe-area-inset-bottom));z-index:30;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1.25,.42,.98);box-shadow:0 -4px 24px rgba(0,0,0,.1);}
    .timer-sheet.show{transform:translateY(0);}
    .timer-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
    .timer-label{font-size:13px;color:var(--muted);text-align:center;margin-bottom:4px;}
    .timer-count{font-size:68px;font-weight:800;text-align:center;letter-spacing:-.04em;font-variant-numeric:tabular-nums;line-height:1.1;}
    .timer-count.urgent{color:var(--red);}
    .timer-count.done-flash{color:var(--green-dk);}
    .timer-presets{display:flex;gap:8px;justify-content:center;margin:14px 0;}
    .timer-preset{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted);}
    .timer-preset.active{border-color:var(--blue);background:var(--blue-lt);color:var(--blue-dk);}
    .timer-btns{display:flex;gap:8px;}
    .timer-skip{flex:1;padding:13px;border:1.5px solid var(--border);background:white;border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;}
    .timer-add{padding:13px 20px;border:none;background:var(--blue-lt);border-radius:var(--radius-sm);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--blue-dk);}

    /* 캘린더 */
    .cal-header{display:flex;align-items:center;justify-content:space-between;padding:20px 20px 12px;}
    .cal-month-title{font-size:20px;font-weight:800;letter-spacing:-.03em;}
    .cal-nav{padding:8px 14px;border:1px solid var(--border);background:white;border-radius:var(--radius-sm);font-size:16px;cursor:pointer;}
    .cal-grid{padding:0 12px;}
    .cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px;}
    .cal-dow-cell{text-align:center;font-size:11px;font-weight:600;color:var(--muted);padding:4px 0;}
    .cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
    .cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;}
    .cal-cell.empty{cursor:default;}
    .cal-cell.today{background:var(--blue-lt);}
    .cal-cell.today .cal-num{color:var(--blue-dk);font-weight:700;}
    .cal-cell.worked{background:var(--green-lt);}
    .cal-cell.rested{background:#F3F4F6;}
    .cal-num{font-size:13px;font-weight:500;}
    .cal-tag{font-size:9px;font-weight:600;color:var(--green-dk);margin-top:1px;}
    .cal-tag.rest{color:var(--muted);}
    .cal-detail{margin:14px 14px 0;background:white;border-radius:var(--radius);border:1px solid var(--border);padding:16px;}
    .cal-detail-date{font-size:12px;color:var(--muted);margin-bottom:6px;}
    .cal-detail-split{font-size:18px;font-weight:700;margin-bottom:10px;}
    .cal-detail-ex{font-size:13px;color:var(--muted);display:flex;flex-direction:column;gap:5px;}
    .cal-meal-section{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:6px;}
    .cal-meal-row{display:flex;gap:8px;align-items:baseline;}
    .cal-meal-label{font-size:12px;font-weight:700;flex-shrink:0;color:var(--text);}
    .cal-meal-text{font-size:13px;color:var(--muted);line-height:1.5;}

    /* 루틴 탭 */
    .routine-wrap{padding:16px;}
    .section-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;margin-top:20px;}
    .section-label:first-child{margin-top:0;}
    .split-card{background:white;border-radius:var(--radius);border:1px solid var(--border);margin-bottom:8px;overflow:hidden;}
    .split-card-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
    .split-card-name{font-size:15px;font-weight:700;display:flex;align-items:center;gap:8px;}
    .split-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
    .split-card-meta{font-size:12px;color:var(--muted);}
    .split-body{border-top:1px solid var(--border);padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
    .split-ex-row{display:flex;align-items:center;gap:8px;}
    .split-ex-name{font-size:13px;font-weight:500;flex:1;}
    .split-ex-info{font-size:12px;color:var(--muted);}
    .del-btn{padding:5px 10px;background:var(--red-lt);color:var(--red);border:none;border-radius:var(--radius-sm);font-size:12px;cursor:pointer;font-family:inherit;flex-shrink:0;}
    .add-ex-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;padding-top:10px;border-top:1px solid var(--border);align-items:flex-end;}
    .input-labeled{display:flex;flex-direction:column;gap:3px;align-items:center;}
    .input-label{font-size:10px;color:var(--muted);font-weight:600;white-space:nowrap;}
    .r-input{padding:8px 10px;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-family:inherit;outline:none;background:white;}
    .r-input:focus{border-color:var(--blue);}
    .r-input.nm{flex:1;min-width:90px;}
    .r-input.n{width:54px;text-align:center;}
    .r-add-btn{padding:8px 14px;background:var(--blue);color:white;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
    .add-split-btn{width:100%;padding:13px;background:var(--blue-lt);color:var(--blue-dk);border:1.5px dashed var(--blue);border-radius:var(--radius);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px;}
    .del-split-row{margin-top:4px;}
    .ex-suggestions{display:flex;flex-wrap:wrap;gap:6px;padding:4px 0 2px;min-height:0;}
    .ex-sug-chip{padding:6px 13px;border-radius:20px;border:1.5px solid var(--blue);background:var(--blue-lt);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--blue-dk);white-space:nowrap;}
    .today-add-btn{width:100%;padding:11px;background:white;border:1.5px dashed var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted);}
    .meal-section{padding:16px 16px 24px;border-top:1px solid var(--border);margin-top:8px;}
    .meal-card{background:white;border-radius:var(--radius);border:1px solid var(--border);padding:12px 14px;margin-bottom:8px;}
    .meal-label{font-size:13px;font-weight:700;margin-bottom:6px;}
    .meal-textarea{width:100%;border:none;outline:none;font-family:inherit;font-size:14px;resize:none;min-height:48px;color:var(--text);line-height:1.6;background:transparent;}
    .meal-textarea::placeholder{color:var(--muted);}

    /* 운동 선택 모달 */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;align-items:flex-end;}
    .modal-overlay.show{display:flex;}
    .modal-sheet{background:white;border-radius:20px 20px 0 0;width:100%;max-height:78vh;display:flex;flex-direction:column;}
    .modal-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
    .modal-title{font-size:16px;font-weight:800;}
    .modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);padding:0 4px;line-height:1;}
    .modal-body{overflow-y:auto;padding:12px 16px 40px;}
    .picker-cat-name{font-size:12px;font-weight:700;color:var(--muted);padding:10px 0 6px;letter-spacing:.04em;text-transform:uppercase;}
    .picker-ex-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px;}
    .picker-ex-btn{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:white;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:var(--text);}
    .picker-ex-btn:active{background:var(--blue-lt);border-color:var(--blue);color:var(--blue-dk);}
  </style>
</head>
<body>

<!-- 인트로 -->
<div id="page-intro" class="page active">
  <div class="intro-wrap">
    <div class="intro-logo">💪</div>
    <div class="intro-title">운동기록</div>
    <div class="intro-sub">나만의 루틴을 기록해요</div>
    <input class="intro-input" id="nickname-input" placeholder="닉네임을 입력해주세요" maxlength="10" />
    <button class="intro-btn" onclick="register()">시작하기</button>
    <div id="admin-entry" style="margin-top:16px;width:100%;max-width:320px;text-align:center;">
      <button class="admin-link" onclick="toggleAdminEntry()">🔐 관리자 모드</button>
      <div id="admin-code-wrap" style="display:none;margin-top:10px;">
        <input class="intro-input" id="admin-code-input" placeholder="관리자 코드" maxlength="10" type="password" style="margin-bottom:8px;" />
        <button class="intro-btn" style="background:var(--text);" onclick="verifyAdminCode()">확인</button>
      </div>
    </div>
  </div>
</div>

<!-- 메인 -->
<div id="page-main" class="page">
  <div class="main-header">
    <div>
      <div class="header-title">운동기록 💪</div>
      <div class="header-user" id="header-user"></div>
    </div>
    <div class="sync-dot" id="sync-dot"></div>
  </div>

  <!-- 오늘 탭 -->
  <div id="tab-today" class="tab-content active">
    <div class="today-header">
      <div class="today-date" id="today-date"></div>
      <div class="today-title" id="today-title">오늘 뭐 할 거야?</div>
    </div>
    <div class="split-selector" id="split-selector"></div>
    <div class="exercise-section" id="exercise-section"></div>
    <div id="today-add-wrap" style="padding:0 16px 4px;display:none;">
      <button class="today-add-btn" id="today-add-toggle" onclick="toggleTodayAddForm()">+ 운동 직접 추가</button>
      <div id="today-add-form" style="display:none;background:white;border-radius:var(--radius);border:1px solid var(--border);padding:14px;margin-top:6px;">
        <div style="display:flex;gap:6px;">
          <input class="r-input nm" id="today-ex-name" placeholder="운동명 입력 또는 검색" oninput="updateTodaySuggest()" autocomplete="off" />
          <button class="r-add-btn" style="background:var(--muted);flex-shrink:0;" onclick="openExPicker('today')">목록</button>
        </div>
        <div class="ex-suggestions" id="today-ex-sug"></div>
        <div style="display:flex;gap:6px;margin-top:8px;align-items:flex-end;">
          <div class="input-labeled"><span class="input-label">세트</span><input class="r-input n" id="today-ex-sets" type="number" value="3" min="1" /></div>
          <div class="input-labeled"><span class="input-label">횟수</span><input class="r-input n" id="today-ex-reps" type="number" value="10" min="1" /></div>
          <div class="input-labeled"><span class="input-label">kg</span><input class="r-input n" id="today-ex-weight" type="number" min="0" placeholder="0" /></div>
          <div class="input-labeled"><span class="input-label">휴식(초)</span><input class="r-input n" id="today-ex-rest" type="number" value="60" min="0" style="width:62px;" /></div>
          <button class="r-add-btn" onclick="addTodayExercise()">추가</button>
        </div>
      </div>
    </div>
    <button class="finish-btn" id="finish-btn" onclick="finishWorkout()" style="display:none;">운동 완료 💪</button>
    <div class="meal-section">
      <div class="section-label" style="margin-top:0;">식단 기록</div>
      <div id="meal-wrap"></div>
    </div>
  </div>

  <!-- 캘린더 탭 -->
  <div id="tab-calendar" class="tab-content">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month-title" id="cal-month"></div>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dow">
        <div class="cal-dow-cell">일</div><div class="cal-dow-cell">월</div><div class="cal-dow-cell">화</div>
        <div class="cal-dow-cell">수</div><div class="cal-dow-cell">목</div><div class="cal-dow-cell">금</div><div class="cal-dow-cell">토</div>
      </div>
      <div class="cal-days" id="cal-days"></div>
    </div>
    <div id="cal-detail"></div>
  </div>

  <!-- 루틴 탭 -->
  <div id="tab-routine" class="tab-content">
    <div class="routine-wrap" id="routine-wrap"></div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-today" onclick="showTab('today')">
      <span class="nav-icon">🏋️</span>오늘
    </button>
    <button class="nav-btn" id="nav-calendar" onclick="showTab('calendar')">
      <span class="nav-icon">📅</span>캘린더
    </button>
    <button class="nav-btn" id="nav-routine" onclick="showTab('routine')">
      <span class="nav-icon">⚙️</span>루틴
    </button>
  </nav>
</div>

<!-- 플로팅 저장 버튼 -->
<button class="fab-save" id="save-btn" onclick="saveAll()">저장</button>

<!-- 운동 선택 모달 -->
<div id="ex-picker-modal" class="modal-overlay" onclick="if(event.target===this)closeExPicker()">
  <div class="modal-sheet">
    <div class="modal-header">
      <div class="modal-title">운동 선택</div>
      <button class="modal-close" onclick="closeExPicker()">✕</button>
    </div>
    <div class="modal-body" id="ex-picker-content"></div>
  </div>
</div>

<!-- 타이머 -->
<div id="timer-sheet" class="timer-sheet">
  <div class="timer-handle"></div>
  <div class="timer-label" id="timer-label">휴식 중 🛌</div>
  <div class="timer-count" id="timer-count">60</div>
  <div class="timer-presets">
    <button class="timer-preset active" data-sec="60" onclick="setTimerDuration(60)">1분</button>
    <button class="timer-preset" data-sec="90" onclick="setTimerDuration(90)">1분 30초</button>
    <button class="timer-preset" data-sec="120" onclick="setTimerDuration(120)">2분</button>
    <button class="timer-preset" data-sec="180" onclick="setTimerDuration(180)">3분</button>
  </div>
  <div class="timer-btns">
    <button class="timer-skip" onclick="skipTimer()">건너뛰기</button>
    <button class="timer-add" onclick="addTimerSeconds(30)">+30초</button>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbz7DmXihUcX7R5ImZgBo0tXAKXtbyp_2PzOR4zHsO_JD0MfJO-BdrBEIF2ySwPyPeTa/exec';
const COLORS = ['#2563EB','#16A34A','#DC2626','#EA580C','#7C3AED','#0891B2','#DB2777','#65A30D'];

let currentUser = null;
let routine = { splits: [] };
let records = {};
let expandedEx = null;
let expandedSplit = null;
let calOffset = 0;
let timerDuration = 60;
let timerRemaining = 0;
let timerInterval = null;
let apiUrl = localStorage.getItem('workout_api_url') || API_URL;
let isAdmin = localStorage.getItem('workout_is_admin') === '1';
let pickerTargetSplit = null;
let gasExercises = [];
try { gasExercises = JSON.parse(localStorage.getItem('workout_exercise_db') || '[]'); } catch(e) {}

// ── 유틸 ──
function dateStr(d) {
  d = d || new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function todayStr() { return dateStr(); }

// ── 스토리지 ──
function loadAll() {
  currentUser = localStorage.getItem('workout_user');
  try { routine = JSON.parse(localStorage.getItem('workout_routine') || '{"splits":[]}'); } catch(e) { routine = {splits:[]}; }
  try { records = JSON.parse(localStorage.getItem('workout_records') || '{}'); } catch(e) { records = {}; }
}
function saveRoutineLocal() { localStorage.setItem('workout_routine', JSON.stringify(routine)); }
function saveRecords() { localStorage.setItem('workout_records', JSON.stringify(records)); }
function setSyncDot(s) {
  const d = document.getElementById('sync-dot');
  if (!d) return;
  d.style.background = s === 'ok' ? 'var(--green)' : s === 'syncing' ? '#F59E0B' : 'var(--red)';
}

// ── 등록 ──
function register() {
  const name = document.getElementById('nickname-input').value.trim();
  if (!name) { document.getElementById('nickname-input').focus(); return; }
  localStorage.setItem('workout_user', name);
  currentUser = name;
  enterMain();
}

function toggleAdminEntry() {
  const wrap = document.getElementById('admin-code-wrap');
  const show = wrap.style.display === 'none';
  wrap.style.display = show ? 'block' : 'none';
  if (show) document.getElementById('admin-code-input').focus();
}

function verifyAdminCode() {
  const code = document.getElementById('admin-code-input').value;
  if (code === '0525') {
    localStorage.setItem('workout_is_admin', '1');
    isAdmin = true;
    document.getElementById('admin-code-wrap').style.display = 'none';
    document.getElementById('admin-code-input').value = '';
    const name = document.getElementById('nickname-input').value.trim();
    if (name) register();
    else document.getElementById('nickname-input').focus();
  } else {
    alert('코드가 틀렸어요');
    document.getElementById('admin-code-input').value = '';
  }
}

function deactivateAdmin() {
  if (!confirm('관리자 모드를 해제할까요?')) return;
  localStorage.removeItem('workout_is_admin');
  isAdmin = false;
  renderRoutine();
}

function showAdminCodeInRoutine() {
  const wrap = document.getElementById('routine-admin-wrap');
  if (!wrap) return;
  wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
  if (wrap.style.display !== 'none') document.getElementById('routine-admin-code')?.focus();
}

function verifyAdminCodeInRoutine() {
  const code = document.getElementById('routine-admin-code')?.value;
  if (code === '0525') {
    localStorage.setItem('workout_is_admin', '1');
    isAdmin = true;
    renderRoutine();
  } else {
    alert('코드가 틀렸어요');
    document.getElementById('routine-admin-code').value = '';
  }
}

// ── 운동 DB 피커 ──
function openExPicker(target) {
  pickerTargetSplit = target;
  const content = document.getElementById('ex-picker-content');
  if (!gasExercises.length) {
    content.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:14px;">운동DB를 불러오는 중이에요<br>GAS URL이 설정되어 있는지 확인해주세요</div>';
  } else {
    const byCategory = {};
    gasExercises.forEach(e => {
      const cat = e.category || '기타';
      if (!byCategory[cat]) byCategory[cat] = [];
      byCategory[cat].push(e.name);
    });
    content.innerHTML = Object.entries(byCategory).map(([cat, exs]) =>
      `<div class="picker-cat-name">${cat}</div>
       <div class="picker-ex-list">${exs.map(name =>
         `<button class="picker-ex-btn" onclick="pickExercise('${name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}'">${name}</button>`
       ).join('')}</div>`
    ).join('');
  }
  document.getElementById('ex-picker-modal').classList.add('show');
}

function closeExPicker() {
  document.getElementById('ex-picker-modal').classList.remove('show');
  pickerTargetSplit = null;
}

function pickExercise(name) {
  const target = pickerTargetSplit;
  closeExPicker();
  if (target === null) return;
  if (target === 'today') {
    const input = document.getElementById('today-ex-name');
    if (input) { input.value = name; input.focus(); }
  } else {
    const input = document.getElementById(`exn-${target}`);
    if (input) { input.value = name; input.focus(); }
  }
}

// ── 운동 자동완성 ──
function getAllExerciseNames() {
  return gasExercises.map(e => e.name);
}

function updateSuggestions(si) {
  const input = document.getElementById(`exn-${si}`);
  const el = document.getElementById(`ex-sug-${si}`);
  if (!input || !el) return;
  const q = input.value.trim();
  if (!q) { el.innerHTML = ''; return; }
  const matches = getAllExerciseNames().filter(n => n.includes(q)).slice(0, 10);
  el.innerHTML = matches.map(name =>
    `<button class="ex-sug-chip" onclick="selectSuggestion(${si},'${name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${name}</button>`
  ).join('');
}

function selectSuggestion(si, name) {
  const input = document.getElementById(`exn-${si}`);
  if (input) input.value = name;
  const el = document.getElementById(`ex-sug-${si}`);
  if (el) el.innerHTML = '';
}

// ── 오늘 직접 추가 ──
function toggleTodayAddForm() {
  const form = document.getElementById('today-add-form');
  const btn = document.getElementById('today-add-toggle');
  const show = form.style.display === 'none';
  form.style.display = show ? 'block' : 'none';
  btn.textContent = show ? '▲ 닫기' : '+ 운동 직접 추가';
  if (show) document.getElementById('today-ex-name').focus();
}

function addTodayExercise() {
  const name = document.getElementById('today-ex-name').value.trim();
  const sets = parseInt(document.getElementById('today-ex-sets').value) || 3;
  const reps = parseInt(document.getElementById('today-ex-reps').value) || 10;
  const weight = parseFloat(document.getElementById('today-ex-weight').value) || 0;
  const rest = parseInt(document.getElementById('today-ex-rest').value) || 60;
  if (!name) { document.getElementById('today-ex-name').focus(); return; }
  if (weight < 0) { alert('kg은 0 이상으로 입력해주세요'); return; }
  const key = todayStr();
  if (!records[key]) records[key] = {};
  if (!records[key].split) records[key].split = '직접';
  if (!records[key].exercises) records[key].exercises = [];
  records[key].exercises.push({ name, sets: Array.from({length: sets}, () => ({weight, reps, done: false})), rest });
  document.getElementById('today-ex-name').value = '';
  document.getElementById('today-ex-sug').innerHTML = '';
  document.getElementById('today-ex-weight').value = '';
  saveRecords();
  syncRecord(key);
  renderToday();
}

function updateTodaySuggest() {
  const q = document.getElementById('today-ex-name').value.trim();
  const el = document.getElementById('today-ex-sug');
  if (!q) { el.innerHTML = ''; return; }
  const matches = getAllExerciseNames().filter(n => n.includes(q)).slice(0, 8);
  el.innerHTML = matches.map(name =>
    `<button class="ex-sug-chip" onclick="selectTodaySuggest('${name.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')">${name}</button>`
  ).join('');
}

function selectTodaySuggest(name) {
  document.getElementById('today-ex-name').value = name;
  document.getElementById('today-ex-sug').innerHTML = '';
}

// ── 식단 기록 ──
function renderMeals() {
  const rec = records[todayStr()] || {};
  const meals = rec.meals || {};
  const items = [
    { key: 'breakfast', label: '🌅 아침' },
    { key: 'lunch',     label: '☀️ 점심' },
    { key: 'dinner',    label: '🌙 저녁' },
  ];
  document.getElementById('meal-wrap').innerHTML = items.map(m =>
    `<div class="meal-card">
      <div class="meal-label">${m.label}</div>
      <textarea class="meal-textarea" placeholder="오늘 뭐 먹었어?" onblur="saveMeal('${m.key}',this.value)">${meals[m.key] || ''}</textarea>
    </div>`
  ).join('');
}

function saveMeal(type, val) {
  const key = todayStr();
  if (!records[key]) records[key] = {};
  if (!records[key].meals) records[key].meals = {};
  records[key].meals[type] = val;
  saveRecords();
  syncRecord(key);
}

// ── 진입 ──
function enterMain() {
  document.getElementById('page-intro').classList.remove('active');
  document.getElementById('page-main').classList.add('active');
  document.getElementById('header-user').textContent = currentUser;
  showTab('today');
  syncFromRemote();
}

function showTab(tab) {
  ['today','calendar','routine'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('nav-' + t).classList.toggle('active', t === tab);
  });
  document.getElementById('save-btn').style.display = tab === 'today' ? 'block' : 'none';
  if (tab === 'today') renderToday();
  if (tab === 'calendar') renderCalendar();
  if (tab === 'routine') renderRoutine();
}

// ── 오늘 탭 ──
function renderToday() {
  const now = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('today-date').textContent = `${now.getMonth()+1}월 ${now.getDate()}일 (${days[now.getDay()]})`;
  const rec = records[todayStr()];
  const split = rec?.split;
  if (split === '쉬는날') document.getElementById('today-title').textContent = '오늘은 쉬는 날 😴';
  else if (split === '직접') document.getElementById('today-title').textContent = '오늘의 운동 💪';
  else if (split) document.getElementById('today-title').textContent = split + ' 운동 🔥';
  else document.getElementById('today-title').textContent = '오늘 뭐 할 거야?';
  renderSplitSelector();
  renderExercises();
  renderMeals();
}

function renderSplitSelector() {
  const container = document.getElementById('split-selector');
  const todaySplit = records[todayStr()]?.split;
  let html = routine.splits.map((s, i) => {
    const c = COLORS[i % COLORS.length];
    const active = todaySplit === s.name;
    const style = active ? `border-color:${c};background:${c}18;color:${c};` : '';
    return `<button class="split-btn" style="${style}" onclick="selectSplit('${s.name}')">${s.name}</button>`;
  }).join('');
  const restActive = todaySplit === '쉬는날';
  html += `<button class="split-btn rest-btn" style="${restActive ? 'border-color:#6B7280;background:#F3F4F6;color:#374151;' : ''}" onclick="selectSplit('쉬는날')">😴 쉬는날</button>`;
  container.innerHTML = html;
}

function selectSplit(name) {
  const key = todayStr();
  if (!records[key]) records[key] = {};

  const meals = records[key]?.meals || {};

  if (name === '쉬는날') {
    if (records[key]?.split === '쉬는날') {
      records[key] = { meals };
      saveRecords();
      renderToday();
      return;
    }
    records[key] = { split: '쉬는날', exercises: [], meals };
    saveRecords();
    syncRecord(key);
    renderToday();
    return;
  }

  if (records[key].split !== name) {
    const splitData = routine.splits.find(s => s.name === name);
    const exercises = (splitData?.exercises || []).map(ex => ({
      name: ex.name,
      sets: Array.from({length: ex.sets}, () => ({ weight: ex.weight, reps: ex.reps, done: false }))
    }));
    records[key] = { split: name, exercises, meals };
    saveRecords();
  }
  expandedEx = 0;
  renderToday();
}

function renderExercises() {
  const container = document.getElementById('exercise-section');
  const finishBtn = document.getElementById('finish-btn');
  const addWrap = document.getElementById('today-add-wrap');
  const rec = records[todayStr()];

  const isRest = rec?.split === '쉬는날';
  if (addWrap) addWrap.style.display = isRest ? 'none' : 'block';

  if (!rec?.split || isRest) {
    container.innerHTML = '';
    finishBtn.style.display = 'none';
    return;
  }
  if (!rec.exercises?.length) {
    container.innerHTML = '<div class="empty-msg">아직 운동이 없어요<br>아래에서 직접 추가하거나 루틴을 선택해보세요 👇</div>';
    finishBtn.style.display = 'none';
    return;
  }

  const allDone = rec.exercises.every(ex => ex.sets.every(s => s.done));
  finishBtn.style.display = allDone ? 'block' : 'none';

  container.innerHTML = rec.exercises.map((ex, ei) => {
    const doneCount = ex.sets.filter(s => s.done).length;
    const total = ex.sets.length;
    const exDone = doneCount === total;
    const expanded = expandedEx === ei;

    let setsHtml = '';
    if (expanded) {
      setsHtml = '<div class="ex-sets">' + ex.sets.map((set, si) => `
        <div class="set-row ${set.done ? 'done-row' : ''}">
          <span class="set-num">${si+1}</span>
          <input class="set-input" type="number" value="${set.weight||''}" placeholder="kg"
            onchange="updateSet(${ei},${si},'weight',this.value)" ${set.done?'disabled':''} />
          <span class="set-unit">kg</span>
          <input class="set-input" type="number" value="${set.reps||''}" placeholder="회"
            onchange="updateSet(${ei},${si},'reps',this.value)" ${set.done?'disabled':''} />
          <span class="set-unit">회</span>
          <button class="set-check-btn ${set.done?'done':''}" onclick="toggleSet(${ei},${si})">
            ${set.done ? '✓ 완료' : '완료'}
          </button>
        </div>`).join('') + '</div>';
    }

    return `<div class="ex-card">
      <div class="ex-card-header" onclick="toggleExpand(${ei})">
        <div class="ex-card-name">${ex.name}</div>
        <div class="ex-progress ${exDone ? 'all-done' : ''}">${doneCount}/${total}세트 ${exDone ? '✓' : expanded ? '▲' : '▼'}</div>
      </div>
      ${setsHtml}
    </div>`;
  }).join('');
}

function toggleExpand(ei) {
  expandedEx = expandedEx === ei ? null : ei;
  renderExercises();
}

function updateSet(ei, si, field, val) {
  const v = parseFloat(val) || 0;
  if (field === 'weight' && v < 0) { alert('kg은 0 이상으로 입력해주세요'); renderExercises(); return; }
  const rec = records[todayStr()];
  rec.exercises[ei].sets[si][field] = v;
  saveRecords();
}

function toggleSet(ei, si) {
  const rec = records[todayStr()];
  const set = rec.exercises[ei].sets[si];
  set.done = !set.done;
  saveRecords();
  if (set.done) {
    const ex = rec.exercises[ei];
    startTimer(ex.rest || 60);
    if (ex.sets.every(s => s.done) && ei + 1 < rec.exercises.length) {
      expandedEx = ei + 1;
    }
  }
  renderExercises();
}

function finishWorkout() {
  saveAll();
  alert('수고했어 💪 오늘도 완료!');
}

function saveAll() {
  setSyncDot('syncing');
  const btn = document.getElementById('save-btn');
  btn.textContent = '저장 중...';
  btn.disabled = true;
  syncRoutine();
  syncRecord(todayStr());
  setTimeout(() => {
    setSyncDot('ok');
    btn.textContent = '저장됨 ✓';
    btn.classList.add('saved');
    setTimeout(() => {
      btn.textContent = '저장';
      btn.classList.remove('saved');
      btn.disabled = false;
    }, 1200);
  }, 700);
}

// ── 타이머 ──
function startTimer(duration) {
  if (duration) timerDuration = duration;
  timerRemaining = timerDuration;
  document.querySelectorAll('.timer-preset').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.sec) === timerDuration);
  });
  document.getElementById('timer-sheet').classList.add('show');
  document.getElementById('page-main').style.paddingBottom = '250px';
  clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timerRemaining--;
    updateTimerDisplay();
    if (timerRemaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
      document.getElementById('timer-count').textContent = '완료!';
      document.getElementById('timer-count').className = 'timer-count done-flash';
      setTimeout(skipTimer, 1200);
    }
  }, 1000);
}

function setTimerDuration(s) {
  timerDuration = s;
  document.querySelectorAll('.timer-preset').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (timerInterval) { clearInterval(timerInterval); startTimer(); }
  else { timerRemaining = s; updateTimerDisplay(); }
}

function addTimerSeconds(s) {
  timerRemaining += s;
  updateTimerDisplay();
}

function skipTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timer-sheet').classList.remove('show');
  document.getElementById('page-main').style.paddingBottom = '70px';
}

function updateTimerDisplay() {
  const el = document.getElementById('timer-count');
  const m = Math.floor(timerRemaining / 60);
  const s = timerRemaining % 60;
  el.textContent = m > 0 ? `${m}:${String(s).padStart(2,'0')}` : String(Math.max(0, timerRemaining));
  el.className = 'timer-count' + (timerRemaining <= 10 ? ' urgent' : '');
}

// ── 캘린더 ──
function renderCalendar() {
  const base = new Date();
  base.setDate(1);
  base.setMonth(base.getMonth() + calOffset);
  const year = base.getFullYear(), month = base.getMonth();
  document.getElementById('cal-month').textContent = `${year}년 ${month+1}월`;

  const firstDow = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month+1, 0).getDate();
  const todayKey = todayStr();

  let html = '';
  for (let i = 0; i < firstDow; i++) html += '<div class="cal-cell empty"></div>';
  for (let d = 1; d <= lastDate; d++) {
    const key = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const rec = records[key];
    const isToday = key === todayKey;
    const isWorked = rec?.split && rec.split !== '쉬는날';
    const isRest = rec?.split === '쉬는날';
    let cls = 'cal-cell';
    if (isToday) cls += ' today';
    else if (isWorked) cls += ' worked';
    else if (isRest) cls += ' rested';
    const tag = isWorked
      ? `<div class="cal-tag">${rec.split.slice(0,2)}</div>`
      : isRest ? '<div class="cal-tag rest">휴</div>' : '';
    const hasMeal = rec?.meals && Object.values(rec.meals).some(m => m?.trim());
    const dot = (!isWorked && !isRest && hasMeal) ? '<div class="cal-tag" style="color:var(--muted);">식</div>' : '';
    html += `<div class="${cls}" onclick="showDayDetail('${key}')"><div class="cal-num">${d}</div>${tag}${dot}</div>`;
  }
  document.getElementById('cal-days').innerHTML = html;
  document.getElementById('cal-detail').innerHTML = '';
}

function changeMonth(d) { calOffset += d; renderCalendar(); }

function showDayDetail(key) {
  const rec = records[key];
  const el = document.getElementById('cal-detail');
  if (!rec?.split && !rec?.meals) { el.innerHTML = ''; return; }
  const dt = new Date(key + 'T00:00:00');
  const label = `${dt.getMonth()+1}월 ${dt.getDate()}일`;

  const meals = rec?.meals || {};
  const mealItems = [
    { key: 'breakfast', label: '🌅 아침' },
    { key: 'lunch',     label: '☀️ 점심' },
    { key: 'dinner',    label: '🌙 저녁' },
  ];
  const mealHtml = mealItems.filter(m => meals[m.key]?.trim()).map(m =>
    `<div class="cal-meal-row"><span class="cal-meal-label">${m.label}</span><span class="cal-meal-text">${meals[m.key]}</span></div>`
  ).join('');

  if (rec?.split === '쉬는날') {
    el.innerHTML = `<div class="cal-detail">
      <div class="cal-detail-date">${label}</div>
      <div class="cal-detail-split">😴 쉬는날</div>
      ${mealHtml ? `<div class="cal-meal-section">${mealHtml}</div>` : ''}
    </div>`;
    return;
  }

  const exHtml = (rec?.exercises || []).map(ex => {
    const done = ex.sets.filter(s => s.done).length;
    return `<div>• ${ex.name} &nbsp;${done}/${ex.sets.length}세트</div>`;
  }).join('');

  el.innerHTML = `<div class="cal-detail">
    <div class="cal-detail-date">${label}</div>
    ${rec?.split ? `<div class="cal-detail-split">${rec.split === '직접' ? '직접 운동' : rec.split} 💪</div>` : ''}
    ${exHtml ? `<div class="cal-detail-ex">${exHtml}</div>` : ''}
    ${mealHtml ? `<div class="cal-meal-section">${mealHtml}</div>` : ''}
  </div>`;
}

// ── 루틴 탭 ──
function renderRoutine() {
  const wrap = document.getElementById('routine-wrap');
  let html = '<div class="section-label">내 루틴</div>';

  if (!routine.splits.length) {
    html += '<div class="empty-msg" style="padding:20px 0;">루틴이 없어요<br>아래에서 분할을 추가해보세요</div>';
  }

  routine.splits.forEach((split, si) => {
    const color = COLORS[si % COLORS.length];
    const expanded = expandedSplit === si;
    let body = '';
    if (expanded) {
      const exRows = split.exercises.map((ex, ei) =>
        `<div class="split-ex-row">
          <div class="split-ex-name">${ex.name}</div>
          <div class="split-ex-info">${ex.sets}세트 × ${ex.reps}회${ex.weight ? ' / ' + ex.weight + 'kg' : ''} / 휴식 ${ex.rest || 60}초</div>
          <button class="del-btn" onclick="deleteExercise(${si},${ei})">삭제</button>
        </div>`).join('');
      body = `<div class="split-body">
        ${exRows}
        <div class="add-ex-row">
          <input class="r-input nm" id="exn-${si}" placeholder="운동명 입력 또는 검색" oninput="updateSuggestions(${si})" autocomplete="off" />
          <button class="r-add-btn" style="background:var(--muted);flex-shrink:0;" onclick="openExPicker(${si})">목록</button>
        </div>
        <div class="ex-suggestions" id="ex-sug-${si}"></div>
        <div class="add-ex-row" style="margin-top:4px;">
          <div class="input-labeled"><span class="input-label">세트</span><input class="r-input n" id="exs-${si}" type="number" value="4" min="1" /></div>
          <div class="input-labeled"><span class="input-label">횟수</span><input class="r-input n" id="exr-${si}" type="number" value="10" min="1" /></div>
          <div class="input-labeled"><span class="input-label">kg</span><input class="r-input n" id="exw-${si}" type="number" min="0" placeholder="0" /></div>
          <div class="input-labeled"><span class="input-label">휴식(초)</span><input class="r-input n" id="exrt-${si}" type="number" value="60" min="0" style="width:62px;" /></div>
          <button class="r-add-btn" onclick="addExercise(${si})">추가</button>
        </div>
        <div class="del-split-row">
          <button class="del-btn" style="width:100%;padding:9px;" onclick="deleteSplit(${si})">이 분할 삭제</button>
        </div>
      </div>`;
    }
    html += `<div class="split-card">
      <div class="split-card-head" onclick="toggleSplit(${si})">
        <div class="split-card-name"><div class="split-dot" style="background:${color}"></div>${split.name}</div>
        <div class="split-card-meta">${split.exercises.length}개 운동 ${expanded?'▲':'▼'}</div>
      </div>
      ${body}
    </div>`;
  });

  html += `<div>
    <div class="section-label" style="margin-top:20px;">분할 추가</div>
    <div style="display:flex;gap:8px;">
      <input class="r-input" id="new-split-name" placeholder="분할명 (예: 가슴데이)" style="flex:1;" />
      <button class="r-add-btn" onclick="addSplit()">추가</button>
    </div>
  </div>`;
  if (isAdmin) {
    html += `<div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);">
      <div class="section-label">앱 설정 🔐</div>
      <div style="margin-bottom:8px;font-size:13px;color:var(--muted);">Google Apps Script URL</div>
      <input class="r-input" id="gas-url-input" placeholder="https://script.google.com/macros/s/..." value="${apiUrl}" style="width:100%;font-size:11px;font-family:monospace;margin-bottom:8px;" />
      <button class="r-add-btn" style="width:100%;" onclick="saveApiUrl()">저장</button>
      <div id="api-url-result" style="font-size:12px;margin-top:6px;min-height:16px;"></div>
    </div>`;
  }

  html += `<div style="margin-top:24px;padding-top:20px;border-top:1px solid var(--border);">
    <button onclick="changeUser()" style="width:100%;padding:11px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted);margin-bottom:8px;">사용자 변경</button>
    ${isAdmin
      ? `<button onclick="deactivateAdmin()" style="width:100%;padding:11px;background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted);">관리자 모드 해제</button>`
      : `<button onclick="showAdminCodeInRoutine()" style="width:100%;padding:11px;background:none;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--muted);">🔐 관리자 모드</button>
         <div id="routine-admin-wrap" style="display:none;margin-top:8px;">
           <input class="r-input" id="routine-admin-code" placeholder="관리자 코드" type="password" maxlength="10" style="width:100%;margin-bottom:8px;" />
           <button class="r-add-btn" style="width:100%;" onclick="verifyAdminCodeInRoutine()">확인</button>
         </div>`
    }
  </div>`;

  wrap.innerHTML = html;
}

function toggleSplit(si) { expandedSplit = expandedSplit === si ? null : si; renderRoutine(); }

function addSplit() {
  const name = document.getElementById('new-split-name').value.trim();
  if (!name) return;
  routine.splits.push({ name, exercises: [] });
  expandedSplit = routine.splits.length - 1;
  saveRoutineLocal();
  syncRoutine();
  renderRoutine();
}

function deleteSplit(si) {
  if (!confirm(`'${routine.splits[si].name}' 분할을 삭제할까요?`)) return;
  routine.splits.splice(si, 1);
  expandedSplit = null;
  saveRoutineLocal();
  syncRoutine();
  renderRoutine();
}

function addExercise(si) {
  const name = document.getElementById(`exn-${si}`).value.trim();
  const sets = parseInt(document.getElementById(`exs-${si}`).value) || 4;
  const reps = parseInt(document.getElementById(`exr-${si}`).value) || 10;
  const weight = parseFloat(document.getElementById(`exw-${si}`).value) || 0;
  const rest = parseInt(document.getElementById(`exrt-${si}`).value) || 60;
  if (!name) return;
  if (weight < 0) { alert('kg은 0 이상으로 입력해주세요'); return; }
  routine.splits[si].exercises.push({ name, sets, reps, weight, rest });
  saveRoutineLocal();
  syncRoutine();
  renderRoutine();
}

function deleteExercise(si, ei) {
  routine.splits[si].exercises.splice(ei, 1);
  saveRoutineLocal();
  syncRoutine();
  renderRoutine();
}

function saveApiUrl() {
  const val = document.getElementById('gas-url-input').value.trim();
  const el = document.getElementById('api-url-result');
  if (!val) { el.textContent = 'URL을 입력해주세요'; el.style.color = 'var(--red)'; return; }
  apiUrl = val;
  localStorage.setItem('workout_api_url', val);
  el.textContent = '✓ 저장됐어요! 동기화 시작...';
  el.style.color = 'var(--green-dk)';
  syncFromRemote();
}

function changeUser() {
  if (!confirm('사용자를 변경할까요? 이 기기의 로컬 데이터는 유지돼요.')) return;
  localStorage.removeItem('workout_user');
  location.reload();
}

// ── GAS 동기화 ──
async function syncRoutine() {
  if (!apiUrl || !currentUser) return;
  try {
    fetch(apiUrl + '?action=saveRoutine&user=' + encodeURIComponent(currentUser) + '&data=' + encodeURIComponent(JSON.stringify(routine)), { mode: 'no-cors' });
  } catch(e) {}
}

async function syncRecord(key) {
  if (!apiUrl || !currentUser) return;
  const rec = records[key];
  if (!rec) return;
  try {
    fetch(apiUrl + '?action=saveRecord&user=' + encodeURIComponent(currentUser) + '&date=' + encodeURIComponent(key) + '&split=' + encodeURIComponent(rec.split) + '&data=' + encodeURIComponent(JSON.stringify(rec)), { mode: 'no-cors' });
  } catch(e) {}
}

async function syncFromRemote() {
  if (!apiUrl || !currentUser) return;
  setSyncDot('syncing');
  try {
    const res = await fetch(apiUrl + '?action=getAll&user=' + encodeURIComponent(currentUser));
    const json = await res.json();
    if (json.routine) { try { routine = JSON.parse(json.routine); saveRoutineLocal(); } catch(e) {} }
    if (json.records) { Object.assign(records, json.records); saveRecords(); }
    setSyncDot('ok');
  } catch(e) { setSyncDot('error'); }
  loadExerciseDB();
}

async function loadExerciseDB() {
  if (!apiUrl) return;
  try {
    const res = await fetch(apiUrl + '?action=getExerciseDB');
    const json = await res.json();
    if (json.ok && json.exercises?.length) {
      gasExercises = json.exercises;
      localStorage.setItem('workout_exercise_db', JSON.stringify(gasExercises));
    }
  } catch(e) {}
}

// ── 초기화 ──
loadAll();
if (currentUser) enterMain();
document.getElementById('nickname-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
document.getElementById('admin-code-input')?.addEventListener('keydown', e => { if (e.key === 'Enter') verifyAdminCode(); });
document.getElementById('today-ex-name')?.addEventListener('keydown', e => { if (e.key === 'Enter') addTodayExercise(); });
</script>

<script>
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
</script>
</body>
</html>
